services:
  - type: web
    runtime: static
    name: git-watchtower-website
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      # astro 7 requires Node >= 22.12.0; pin the Render build runtime so the
      # deploy doesn't fall back to an older default and fail to build.
      - key: NODE_VERSION
        value: "22.12.0"
      - key: PUBLIC_POSTHOG_KEY
        value: phc_fdGL8TVN5aFPXmQ4f1hI8y6sqnscD7dy9j5SM5gTylG
      - key: PUBLIC_POSTHOG_HOST
        value: https://aph.gitwatchtower.dev
      - key: PUBLIC_POSTHOG_UI_HOST
        value: https://us.posthog.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
