# Dependabot configuration for automated dependency updates.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm dev dependencies. The published package itself has zero runtime
  # dependencies, so every bump here is dev-only tooling. The "chore" commit
  # prefix keeps semantic-release from cutting a release for these updates.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
    groups:
      dev-dependencies:
        patterns:
          - "*"

  # npm dependencies for the website/ subproject (the Astro docs site). These
  # are excluded from semantic-release analysis (see scripts/release-filter-cli.js),
  # so website bumps never cut a release for the CLI package.
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
    groups:
      website-dependencies:
        patterns:
          - "*"

  # GitHub Actions used by the workflows in .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
